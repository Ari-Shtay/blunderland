<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#16303c"/>
      <stop offset="55%" stop-color="#0e1e27"/>
      <stop offset="100%" stop-color="#081014"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c25e"/>
      <stop offset="50%" stop-color="#d3a83c"/>
      <stop offset="100%" stop-color="#a97f22"/>
    </linearGradient>
    <linearGradient id="ivory" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f0dd"/>
      <stop offset="100%" stop-color="#e2d5b8"/>
    </linearGradient>
  </defs>

  <!-- dark slate plate -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none"
        stroke="url(#gold)" stroke-width="10"/>
  <rect x="26" y="26" width="460" height="460" rx="88" fill="none"
        stroke="#d3a83c" stroke-opacity="0.28" stroke-width="2"/>

  <!-- the gold square, worn as a diamond -->
  <g transform="translate(256 356)">
    <rect x="-92" y="-92" width="184" height="184" rx="14"
          transform="rotate(45)" fill="url(#gold)" opacity="0.92"/>
    <rect x="-92" y="-92" width="184" height="184" rx="14"
          transform="rotate(45)" fill="none" stroke="#f7e3a8"
          stroke-opacity="0.55" stroke-width="4"/>
  </g>

  <!-- soft candle-glow behind the piece -->
  <ellipse cx="256" cy="230" rx="150" ry="140" fill="#d3a83c" opacity="0.10"/>

  <!-- the knight, mid-topple (cburnett wN, CC BY-SA 3.0, restyled) -->
  <g transform="translate(256 240) rotate(14) scale(8.4) translate(-22.5 -24)">
    <g fill="none" fill-rule="evenodd" stroke="#151009" stroke-width="1.5"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 10c10.5 1 16.5 8 16 29H15c0-9 10-6.5 8-21" fill="url(#ivory)"/>
      <path d="M24 18c.38 2.91-5.55 7.37-8 9-3 2-2.82 4.34-5 4-1.042-.94 1.41-3.04 0-3-1 0 .19 1.23-1 2-1 0-4.003 1-4-4 0-2 6-12 6-12s1.89-1.9 2-3.5c-.73-.994-.5-2-.5-3 1-1 3 2.5 3 2.5h2s.78-1.992 2.5-3c1 0 1 3 1 3" fill="url(#ivory)"/>
      <path d="M9.5 25.5a.5.5 0 1 1-1 0 .5.5 0 1 1 1 0zm5.433-9.75a.5 1.5 30 1 1-.866-.5.5 1.5 30 1 1 .866.5z" fill="#151009"/>
    </g>
  </g>

  <!-- tumble arcs: the fall in progress -->
  <g fill="none" stroke="#d3a83c" stroke-width="7" stroke-linecap="round" opacity="0.75">
    <path d="M 372 132 a 96 96 0 0 1 22 44"/>
    <path d="M 396 108 a 132 132 0 0 1 30 60"/>
  </g>
</svg>
